# LuaGH — Default Configuration
# See: https://github.com/yannic/luaGH

# Lua standard library version
std = "lua54"

[files]
include = ["**/*.lua", "**/*.luau"]
exclude = ["**/node_modules/**", "**/vendor/**", "**/.luarocks/**"]

[globals]
# Additional read-write globals (empty by default)
read_write = []
# Additional read-only globals (empty by default)
read_only = []

# ─── Named Regex Patterns ──────────────────────────────────────────────
# Define patterns here and reference them by name in [naming].

[regex]
snake_case           = '^[a-z_][a-z0-9_]*$'
pascal_case          = '^[A-Z][A-Za-z0-9]*$'
screaming_snake_case = '^[A-Z][A-Z0-9_]*$'
camel_case           = '^[a-z][a-zA-Z0-9]*$'

# ─── Rule Configuration ────────────────────────────────────────────────

[rules]
# Lint rules
"lint.unused_local"      = "warning"
"lint.undefined_global"  = "error"
"lint.shadowing"         = "info"

# Naming convention rules
"naming.local_variable_case"  = "warning"
"naming.global_variable_case" = "warning"
"naming.function_case"        = "warning"
"naming.method_case"          = "warning"

# ─── Naming Conventions ────────────────────────────────────────────────
# Use pattern names from [regex] or raw regex strings.
#
# With named patterns:
#   local_variable = "snake_case"        → resolves to '^[a-z_][a-z0-9_]*$'
#   function       = "pascal_case"       → resolves to '^[A-Z][A-Za-z0-9]*$'
#
# Module-style globals like `Config` (from config.lua) are exempted
# via ignore_names so they don't break the snake_case rule.

[naming]
local_variable  = "snake_case"
global_variable = "snake_case"
function        = "pascal_case"
method          = "snake_case"
constant        = "screaming_snake_case"
parameter       = "snake_case"

# Names that are always allowed regardless of convention
ignore_names = [
    "_",
    "self",
    "__index",
    "__newindex",
    "__call",
    "__tostring",
    "__len",
    "__unm",
    "__add",
    "__sub",
    "__mul",
    "__div",
    "__mod",
    "__pow",
    "__concat",
    "__eq",
    "__lt",
    "__le",
    "__gc",
    "__mode",
    "__metatable",
]

# ─── Per-Path Overrides ────────────────────────────────────────────────

# Example: disable unused_local warnings in test files
# [[overrides]]
# path = "tests/**"
# [overrides.rules]
# "lint.unused_local" = "off"
